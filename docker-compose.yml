version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai-k8s-agent-backend
    ports:
      - "8000:8000"
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - OPENROUTER_MODEL=${OPENROUTER_MODEL:-google/gemini-2.5-flash}
      - SIMULATION_MODE=${SIMULATION_MODE:-true}
      - KUBECONFIG_PATH=/root/.kube/config
    volumes:
      # Mount host's .kube folder into the container's root .kube folder
      # Using standard home directory shortcut; fallback to mock when cluster not reachable
      - ~/.kube:/root/.kube:ro
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ai-k8s-agent-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_BASE_URL=http://localhost:8000
      - NEXT_PUBLIC_INSFORGE_URL=${NEXT_PUBLIC_INSFORGE_URL:-}
      - NEXT_PUBLIC_INSFORGE_ANON_KEY=${NEXT_PUBLIC_INSFORGE_ANON_KEY:-}
    depends_on:
      - backend
    restart: always
